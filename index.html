<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tareas</title>
<style>
  body { font-family: Arial; margin: 20px; background: #f5f5f5; color:#000; }
  body.dark { background:#121212; color:#eee; }
  h1 { text-align: center; }
  .container { max-width: 600px; margin: auto; }
  .card { background: white; padding: 8px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .opc{display: flex; justify-content: space-between;}
  body.dark .card { background:#1e1e1e; }

  .darky{display: flex; justify-content: flex-end; margin-bottom: 10px;}

  input, select, textarea { width: 94%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; }
  button { width: 20%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; }
  body.dark input, body.dark select, body.dark textarea { background:#2a2a2a; color:#eee; border:1px solid #d5c8c8; }
  .date{width: 40%;}

  .btn-primary { background: #4cadfc; color: white; border: none; }
  .btn-delete { background: #ff3633f8; color: white; border: none; }
  .btn-edit { background:#ffc72d; color:white; border:none; }
  .btn-dark{ background-color: #475295; border: none; }
   body.dark .btn-dark{ background-color: #49cfff; border: none; }

  .file-link { display:block; margin-top:5px; color:#1976D2; cursor:pointer; }
  .date { font-size:0.9em; color:gray; }

  /* Color para tareas importantes */
  .priority-important {
    border-left: 8px solid #FFD700 !important; /* Dorado/Amarillo */
    background: #fffdf0 !important;
  }

  body.dark .priority-important {
    background: #2d2a10 !important;
    border-left: 8px solid #ccac00 !important;
  }

  /* Ajuste para que las vencidas tengan prioridad visual sobre las importantes */
  .overdue {
    background: #7d8eff1e  !important;
    border-left: 8px solid #878787da !important;
  }

  /* Tarea próxima a vencer (ej. hoy o mañana) */
  .near-deadline {
    background: #fde9e9 !important;
    border-left: 8px solid #e53935 !important;
  }

  body.dark .near-deadline {
    background: #3c1e1e !important;
    border-left: 8px solid #d32f2f !important;
  }

  /* Contenedor de botones en una fila */
  .actions {
    display: flex;
    gap: 5px;
    margin-top: 10px;
  }
  .actions button {
    flex: 1; /* Todos los botones miden lo mismo */
    margin-top: 0;
    padding: 8px 2px;
    font-size: 0.9em;
  }

  /* Estilo para tarea completada */
  .task-done {
    opacity: 0.6;
    text-decoration: line-through;
    background: #e8f5e9 !important;
  }
  body.dark .task-done { background: #1b5e20 !important; }

  .btn-complete { background: #58ca5c; color: white; border: none; }

  .btn-filter {
    background: #eee;
    color: #333;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    font-size: 0.85em;
    transition: all 0.3s;
  }
  .btn-filter.active {
    background: #4cadfc;
    color: white;
  }
  body.dark .btn-filter { background: #333; color: #eee; }
  body.dark .btn-filter.active { background: #4cadfc; color: white; }

  .modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
  }

  .modal-content {
    background:white;
    padding:20px;
    border-radius:12px;
    width:90%; max-width:500px;
    max-height:80vh;
    overflow:auto;
  }

  body.dark .modal-content { background:#1e1e1e; }

  .calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }

   .calendar-header button{
    width:auto;
    padding:5px 10px;
  }

  .calendar-day{
    padding:10px;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
    background:#eee;
    color:#000;
  }

  body.dark .calendar-day{
    background:#2a2a2a;
    color:#eee;
  }

  .link-task{
    cursor:pointer;
    color:#42a8fb;
    margin-bottom:5px;
  }
</style>
<link rel="manifest" href="manifest.json">
</head>
<body>
<div class="container">
  <h1>Mis Tareas</h1>
  <div class="darky"><button id="themeToggle" class="btn-dark" onclick="toggleDarkMode()">🌙</button></div>
  <div class="card">
    <input type="text" id="title" placeholder="Nombre de la tarea">
    <textarea id="desc" placeholder="Descripción"></textarea>
    <div class="opc">
        <input type="date" id="date" class="date">
        <label>⭐ Importante<input type="checkbox" id="important"></label>
    </div>
    <input type="file" id="file">
    <div class="darky"><button class="btn-primary" onclick="addTask()">💾</button></div>
  </div>

  <div class="card" id="stats"></div>

  <div class="card">
    <input type="text" id="searchBar" placeholder="🔍 Buscar tarea..." onkeyup="updateSearch()">
    <div style="display: flex; gap: 5px; overflow-x: auto; margin-top: 10px; padding-bottom: 5px;">
      <button class="btn-filter active" onclick="filterTasks('all', this)">📚</button>
      <button class="btn-filter" onclick="filterTasks('pending', this)">📓</button>
      <button class="btn-filter" onclick="filterTasks('important', this)">⭐</button>
      <button class="btn-filter" onclick="filterTasks('normal', this)">📄</button>
      <button class="btn-filter" onclick="filterTasks('completed', this)">✅</button>
    </div>
  </div>
  <div id="tasks"></div>
</div>

<div class="modal" id="dayModal">
  <div class="modal-content">
    <h3 id="dayTitle"></h3>
    <div id="dayTasks"></div>
    <button onclick="closeDayModal()">Cerrar</button>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Editar tarea</h3>
    <input type="text" id="editTitle">
    <textarea id="editDesc"></textarea>
    <div class="opc">
      <input type="date" id="editDate" class="date">
      <label><input type="checkbox" id="editImportant">⭐</label>
    </div>
    <input type="file" id="editFile">
    <button onclick="saveEdit()">💾</button>
    <button onclick="removeFile()">🗑️📎</button>
    <button onclick="closeModal()">❌</button>
  </div>
</div>

<!-- Modal calendario -->
<div class="modal" id="dayModal">
  <div class="modal-content">
    <h3 id="dayTitle"></h3>
    <div id="dayTasks"></div>
    <button onclick="closeDayModal()">❌</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h3>📅 Calendario</h3>
    <div class="calendar-header">
      <button onclick="prevMonth()">⬅️</button>
      <strong id="monthLabel"></strong>
      <button onclick="nextMonth()">➡️</button>
    </div>
    <div id="calendar"></div>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
let editIndex = null;

let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();

function saveTasks(){ localStorage.setItem('tasks', JSON.stringify(tasks)); }
function toggleDarkMode() {
  const body = document.body;
  const btn = document.getElementById('themeToggle');
  body.classList.toggle('dark');
  if (body.classList.contains('dark')) {
    btn.innerHTML = '☀️'; // Cambia a sol cuando está en modo oscuro // 
    btn.style.textShadow = "0 0 10px #FFD700"; // Efecto de resplandor
  } else {
    btn.innerHTML = '🌙'; // Regresa a luna en modo claro 
    btn.style.textShadow = "0 0 10px #FFD700";
  }
}

function renderStats(){
  const container = document.getElementById('stats');
  if(!container) return; // Seguridad

  const total = tasks.length;
  const completed = tasks.filter(t => t.completed).length;
  const pending = total - completed;
  const percent = total ? Math.round((completed / total) * 100) : 0;

  const today = new Date();
  const overdue = tasks.filter(t => t.date && new Date(t.date) < today && !t.completed).length;

  container.innerHTML = `
    <div style="line-height: 1.6;">
      <strong>📊 Estadísticas</strong><br>
      <div style="background: #eee; border-radius: 5px; height: 10px; margin: 5px 0;">
        <div style="background: #4CAF50; width: ${percent}%; height: 100%; border-radius: 5px; transition: width 0.5s;"></div>
      </div>
      Total: <b>${total}</b> | Completadas: <b>${completed}</b><br>
      Pendientes: <b>${pending}</b> | 🚨 Vencidas: <b style="color: #e53935;">${overdue}</b>
    </div>
  `;
}

let currentFilter = 'all'; // Variable global nueva

function filterTasks(type, btn) {
  currentFilter = type;
  
  // Cambiar estado visual de los botones
  document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  renderTasks();
}

let searchQuery = ''; // Nueva variable global para el texto de búsqueda

function updateSearch() {
  searchQuery = document.getElementById('searchBar').value.toLowerCase();
  renderTasks(); // Volvemos a dibujar la lista con el nuevo filtro de texto
}

function renderTasks() {
  const container = document.getElementById('tasks');
  container.innerHTML = '';
  const today = new Date();
  today.setHours(0, 0, 0, 0); // Normalizamos hoy para comparar fechas

  // 1. CLONAR Y ORDENAR por fecha (Ascendente)
  // Las tareas sin fecha se van al final
  let sortedTasks = [...tasks].sort((a, b) => {
    if (!a.date) return 1;
    if (!b.date) return -1;
    return new Date(a.date) - new Date(b.date);
  });

  // 2. FILTRAR por categoría
  let filtered = sortedTasks;
  if (currentFilter === 'pending') filtered = sortedTasks.filter(t => !t.completed);
  if (currentFilter === 'important') filtered = sortedTasks.filter(t => t.important && !t.completed);
  if (currentFilter === 'normal') filtered = sortedTasks.filter(t => !t.important && !t.completed);
  if (currentFilter === 'completed') filtered = sortedTasks.filter(t => t.completed);

  // 3. FILTRAR por búsqueda
  if (searchQuery) {
    filtered = filtered.filter(t => 
      t.title.toLowerCase().includes(searchQuery) || 
      (t.desc && t.desc.toLowerCase().includes(searchQuery))
    );
  }

  // 4. RENDERIZAR
  filtered.forEach((task) => {
    const originalIndex = tasks.indexOf(task); 
    const taskDate = task.date ? new Date(task.date + 'T00:00:00') : null;
    
    const isOverdue = taskDate && taskDate < today && !task.completed;
    const isToday = taskDate && taskDate.getTime() === today.getTime() && !task.completed;

    const div = document.createElement('div');
    div.id = 'task-' + originalIndex;

    // Lógica de colores mejorada
    let statusClass = '';
    if (task.important && !task.completed) statusClass = 'priority-important';
    if (isToday) statusClass = 'near-deadline'; // Tono rojizo si es para hoy
    if (isOverdue) statusClass = 'overdue';    // Franja roja si ya pasó

    div.className = `card ${statusClass} ${task.completed ? 'task-done' : ''}`;

    div.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
          <strong>${task.title}</strong><br>
          <small>${task.desc || ''}</small>
        </div>
        ${task.important ? '<span>⭐</span>' : ''}
      </div>
      <div class="date" style="margin-top:5px; font-weight: ${isToday ? 'bold' : 'normal'}">
        ${task.date || 'Sin fecha'} ${isToday ? '— ¡Es hoy!' : ''}
      </div>
      ${task.fileData ? `<span class="file-link" onclick="openFile(${originalIndex})">📎 Ver archivo</span>` : ''}
      <div class="actions">
        <button class="btn-complete" onclick="toggleComplete(${originalIndex})">${task.completed ? '↩️' : '✅'}</button>
        <button class="btn-edit" onclick="openEdit(${originalIndex})">✏️</button>
        <button class="btn-delete" onclick="deleteTask(${originalIndex})">🗑️</button>
      </div>
    `;
    container.appendChild(div);
  });

  if (filtered.length === 0) {
    container.innerHTML = `<p style="text-align:center; color:gray; margin-top:20px;">No hay tareas que mostrar.</p>`;
  }
}

function openFromCalendar(i){
  document.getElementById('task-'+i).scrollIntoView({behavior:'smooth'});
}

function addTask() {
  const titleInput = document.getElementById('title');
  const descInput = document.getElementById('desc');
  const dateInput = document.getElementById('date');
  const importantInput = document.getElementById('important');
  const fileInput = document.getElementById('file');

  // VALIDACIÓN: Evita guardar si el título está vacío
  if (!titleInput.value.trim()) {
    titleInput.style.borderColor = "red";
    setTimeout(() => titleInput.style.borderColor = "", 2000);
    return;
  }

  const title = titleInput.value;
  const desc = descInput.value;
  const date = dateInput.value;
  const important = importantInput.checked;
  const file = fileInput.files[0];

  // Función interna para procesar el guardado y limpiar
  const processSave = (fileData) => {
    tasks.push({ title, desc, date, fileData, important, completed: false });
    saveTasks();
    
    // LIMPIEZA: Resetear el formulario
    titleInput.value = '';
    descInput.value = '';
    dateInput.value = '';
    importantInput.checked = false;
    fileInput.value = '';

    // ACTUALIZAR VISTA
    renderStats();
    renderTasks();
    renderCalendar();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = e => processSave(e.target.result);
    reader.readAsDataURL(file);
  } else {
    processSave(null);
  }
}

function saveTask(title,desc,date,fileData,important){
  tasks.push({title,desc,date,fileData,important,completed:false});
  saveTasks(); renderStats(); renderTasks(); renderCalendar();
}

function openEdit(i){
  editIndex=i;
  const t=tasks[i];

  document.getElementById('editTitle').value=t.title;
  document.getElementById('editDesc').value=t.desc||'';
  document.getElementById('editDate').value=t.date||'';
  document.getElementById('editImportant').checked=t.important;

  document.getElementById('editModal').style.display='flex';
}

function saveEdit(){
  const t=tasks[editIndex];

  t.title=document.getElementById('editTitle').value;
  t.desc=document.getElementById('editDesc').value;
  t.date=document.getElementById('editDate').value;
  t.important=document.getElementById('editImportant').checked;

  const file=document.getElementById('editFile').files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=e=>{
      t.fileData=e.target.result;
      saveTasks(); renderStats(); renderTasks(); renderCalendar(); closeModal();
    };
    reader.readAsDataURL(file);
  } else {
    saveTasks(); renderStats(); renderTasks(); renderCalendar(); closeModal();
  }
}

function removeFile(){
  tasks[editIndex].fileData=null;
  saveTasks(); renderStats(); renderTasks(); renderCalendar();
}

function closeModal(){ document.getElementById('editModal').style.display='none'; }

function openFile(i){
  const win=window.open();
  win.document.write(`<iframe src="${tasks[i].fileData}" style="width:100%;height:100%"></iframe>`);
}

function deleteTask(i){
  if(confirm('¿Eliminar?')){
    tasks.splice(i,1);
    saveTasks(); renderStats(); renderTasks(); renderCalendar();
  }
}

function toggleComplete(i) {
  tasks[i].completed = !tasks[i].completed;
  saveTasks();
  renderTasks();
  renderStats(); // Para que el porcentaje suba al instante
}

function renderCalendar(){
  const calendar = document.getElementById('calendar');
  const label = document.getElementById('monthLabel');
  calendar.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  // Ajuste para que la semana empiece en Lunes (opcional, si prefieres Domingo quita el logic de abajo)
  const startingDay = firstDay === 0 ? 6 : firstDay - 0; 
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
  label.textContent = monthNames[currentMonth] + " " + currentYear;

  const daysHeader = ['D','L', 'M', 'M', 'J', 'V', 'S'];
  let html = '<div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:5px; text-align:center;">';
  
  daysHeader.forEach(day => {
    html += `<div style="font-weight:bold; font-size:0.8em; padding-bottom:5px;">${day}</div>`;
  });

  for(let i = 0; i < startingDay; i++) html += '<div></div>';

  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const count = tasks.filter(t => t.date === dateStr).length;
    const isToday = new Date().toISOString().split('T')[0] === dateStr;

    html += `
      <div style="padding:8px 2px; border-radius:8px; background:${isToday ? '#4cadfc' : '#eee'}; 
           color:${isToday ? 'white' : 'black'}; text-align:center; cursor:pointer; font-size:0.9em;" 
           onclick="showDayTasks('${dateStr}')">
        ${d}${count > 0 ? `<br><b style="font-size:0.7em;">• ${count}</b>` : ''}
      </div>`;
  }

  html += '</div>';
  calendar.innerHTML = html;
}

function prevMonth(){
  currentMonth--;
  if(currentMonth<0){ currentMonth=11; currentYear--; }
  renderCalendar();
}

function nextMonth(){
  currentMonth++;
  if(currentMonth>11){ currentMonth=0; currentYear++; }
  renderCalendar();
}

function showDayTasks(date){
  const list=document.getElementById('dayTasks');
  const title=document.getElementById('dayTitle');

  const dayTasks=tasks.map((t,i)=>({...t,index:i})).filter(t=>t.date===date);
  title.textContent = "Tareas para " + date;

  if(dayTasks.length===0){
    list.innerHTML = "<p>No hay tareas este día</p>";
  } else {
    list.innerHTML = dayTasks.map(t=>
      `<div class="link-task" onclick="goToTask(${t.index})">• ${t.title}</div>`
    ).join('');
  }

  document.getElementById('dayModal').style.display='flex';
}

function goToTask(i){
  closeDayModal();
  setTimeout(()=>{
    document.getElementById('task-'+i).scrollIntoView({behavior:'smooth'});
  },200);
}

function closeDayModal(){ document.getElementById('dayModal').style.display='none'; }

// Registrar el Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

renderTasks();
renderStats();
renderCalendar();
</script>
</body>
</html>
